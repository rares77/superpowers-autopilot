<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">superpowers-autopilot hero banner</title>
  <desc id="desc">A banner showing PRD to autonomous implementation with review, plan, build, and commit stages.</desc>
  <defs>
    <linearGradient id="bg" x1="86" y1="68" x2="1188" y2="588" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8EE"/>
      <stop offset="1" stop-color="#F7E7D5"/>
    </linearGradient>
    <linearGradient id="accent" x1="236" y1="0" x2="1058" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF8A3D"/>
      <stop offset="1" stop-color="#C74A2E"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#7B4028" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="40" y="36" width="1200" height="568" rx="34" fill="url(#bg)"/>
  <g opacity="0.32">
    <circle cx="1124" cy="124" r="84" fill="#FFD0B2"/>
    <circle cx="1146" cy="134" r="52" fill="#FFF3E6"/>
    <circle cx="170" cy="516" r="110" fill="#F6D6B8"/>
  </g>
  <path d="M928 72C1027 88 1117 140 1170 220C1228 308 1230 404 1178 500" stroke="#E3B18A" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 14"/>
  <path d="M166 160C272 110 401 84 530 86" stroke="#E3B18A" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 14"/>

  <text x="104" y="120" fill="#9C4F29" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" letter-spacing="3">superpowers-autopilot</text>
  <text x="104" y="198" fill="#241914" font-family="Georgia, Times New Roman, serif" font-size="68" font-weight="700">PRD -&gt; Autonomous</text>
  <text x="104" y="270" fill="#241914" font-family="Georgia, Times New Roman, serif" font-size="68" font-weight="700">Implementation</text>
  <text x="106" y="324" fill="#5F4436" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28">
